<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ad Page Personalizer</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:sans-serif;background:#f5f5f5;
         min-height:100vh;padding:40px 20px}
    .container{max-width:600px;margin:0 auto;
               background:#fff;border-radius:12px;
               padding:32px;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
    h1{font-size:22px;font-weight:600;margin-bottom:6px}
    p.sub{color:#666;font-size:14px;margin-bottom:28px}
    label{display:block;font-size:13px;font-weight:500;
          margin-bottom:6px;margin-top:20px;color:#333}
    input{width:100%;padding:10px 12px;border:1px solid #ddd;
          border-radius:8px;font-size:14px;outline:none}
    input:focus{border-color:#534AB7}
    button{margin-top:24px;width:100%;padding:13px;
           background:#534AB7;color:#fff;border:none;
           border-radius:8px;font-size:15px;font-weight:500;
           cursor:pointer;transition:background .2s}
    button:hover{background:#3C3489}
    button:disabled{background:#aaa;cursor:not-allowed}
    #status{margin-top:16px;font-size:13px;color:#666;
            text-align:center;min-height:20px}
    .steps{display:flex;justify-content:center;gap:8px;
           margin-top:12px;flex-wrap:wrap}
    .step-pill{font-size:11px;padding:3px 10px;
               border-radius:20px;background:#f0f0f0;color:#999}
    .step-pill.active{background:#EDE9FF;color:#534AB7;font-weight:500}
    .step-pill.done{background:#E1F5EE;color:#085041}
    #summary{margin-top:20px;background:#f9f9f9;
             border-radius:8px;padding:16px;font-size:13px;
             line-height:1.7;white-space:pre-wrap;display:none;
             border-left:3px solid #534AB7}
    #result{margin-top:20px;display:none}
    #result h3{font-size:14px;font-weight:500;margin-bottom:10px}
    iframe{width:100%;height:560px;border:1px solid #ddd;
           border-radius:8px}
    .error{color:#c0392b;background:#fdf0f0;padding:10px 14px;
           border-radius:8px;font-size:13px;margin-top:12px}
  </style>
</head>
<body>
<div class="container">
  <h1>Ad Page Personalizer</h1>
  <p class="sub">Paste your ad image URL and landing page — we'll personalize the page to match your ad creative.</p>

  <label>Ad creative URL (direct image link)</label>
  <input type="url" id="adUrl"
    placeholder="https://example.com/ad-banner.jpg">

  <label>Landing page URL</label>
  <input type="url" id="pageUrl"
    placeholder="https://yoursite.com/landing">

  <button id="btn" onclick="runPipeline()">
    Personalize this page
  </button>

  <div id="status"></div>
  <div class="steps" id="steps" style="display:none">
    <span class="step-pill" id="p1">Scraping page</span>
    <span class="step-pill" id="p2">Analyzing ad</span>
    <span class="step-pill" id="p3">Planning changes</span>
    <span class="step-pill" id="p4">Building page</span>
  </div>

  <div id="error-box"></div>
  <div id="summary"></div>
  <div id="result">
    <h3>Personalized preview</h3>
    <iframe id="preview"></iframe>
  </div>
</div>

<script>
const WEBHOOK = 'https://hardikopt.app.n8n.cloud/webhook/4e55630e-faa6-4530-b7a5-244ceeed52ba';

async function runPipeline() {
  const ad = document.getElementById('adUrl').value.trim();
  const page = document.getElementById('pageUrl').value.trim();

  if (!ad || !page) {
    alert('Please fill in both fields');
    return;
  }

  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Processing...';
  document.getElementById('steps').style.display = 'flex';
  document.getElementById('error-box').innerHTML = '';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('status').textContent = 'Starting pipeline...';

  const pills = ['p1','p2','p3','p4'];
  let current = 0;
  const interval = setInterval(() => {
    if (current > 0) {
      document.getElementById(pills[current-1]).className = 'step-pill done';
    }
    if (current < pills.length) {
      document.getElementById(pills[current]).className = 'step-pill active';
      current++;
    }
  }, 8000);

  try {
    const res = await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ad_url: ad, page_url: page })
    });

    clearInterval(interval);
    pills.forEach(p => {
      document.getElementById(p).className = 'step-pill done';
    });

    const data = await res.json();

    if (data.error) {
      throw new Error(data.message || 'Pipeline failed');
    }

    document.getElementById('status').textContent =
      `Done! ${data.change_count} changes applied.`;

    if (data.summary) {
      document.getElementById('summary').textContent = data.summary;
      document.getElementById('summary').style.display = 'block';
    }

    const blob = new Blob([data.html], { type: 'text/html' });
    document.getElementById('preview').src = URL.createObjectURL(blob);
    document.getElementById('result').style.display = 'block';

  } catch(e) {
    clearInterval(interval);
    document.getElementById('status').textContent = '';
    document.getElementById('error-box').innerHTML =
      `<div class="error">Error: ${e.message}. Please try again.</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Personalize this page';
  }
}
</script>
</body>
</html>
